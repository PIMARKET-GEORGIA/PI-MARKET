<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <title>PI GEORGIA</title>
</head>
<body style="text-align: center; padding: 50px; font-family: sans-serif;">
    <h1>MY PI GEORGIA</h1>
    <div id="user-info">გთხოვთ გაიაროთ ავტორიზაცია</div>
    <button onclick="auth()" style="background: #673ab7; color: white; padding: 15px; border: none; border-radius: 10px;">შესვლა Pi-თ</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function auth() {
            try {
                const scopes = ['username', 'payments'];
                const authResponse = await Pi.authenticate(scopes, (payment) => {
                    console.log("Found incomplete payment:", payment);
                });
                document.getElementById('user-info').innerText = "მოგესალმებით, " + authResponse.user.username;
            } catch (err) {
                alert("გთხოვთ, გახსნათ ეს საიტი Pi Browser-ში!");
            }
        }
    </script>
</body>
</html>
